<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sculpture Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Lato', sans-serif; }
  canvas { display: block; }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #9ca3af; font-size: 14px; text-align: center;
  }
  #loading .spinner {
    width: 32px; height: 32px; border: 3px solid #374151; border-top-color: #7c3aed;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #info {
    position: absolute; bottom: 12px; left: 14px;
    color: #6b7280; font-size: 11px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #controls {
    position: absolute; top: 12px; right: 14px; display: flex; gap: 6px;
  }
  #controls button {
    background: rgba(124, 58, 237, 0.15); border: 1px solid rgba(124, 58, 237, 0.4);
    color: #c4b5fd; font-size: 11px; padding: 5px 10px; border-radius: 4px;
    cursor: pointer; font-family: inherit;
  }
  #controls button:hover { background: rgba(124, 58, 237, 0.3); color: #ede9fe; }
  #error {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #f87171; font-size: 14px; text-align: center; display: none;
  }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div>Loading sculpture&hellip;</div>
<div id="error"></div>
<div id="info"></div>
<div id="controls">
  <button id="btn-reset">Reset view</button>
  <button id="btn-wire">Wireframe</button>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.170.0",
    "three/addons/": "https://esm.sh/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

const loadingEl = document.getElementById('loading');
const errorEl   = document.getElementById('error');
const infoEl    = document.getElementById('info');

/* ---------- read STL data from parent textarea ---------- */
async function waitForData(maxWaitMs = 12000) {
  const start = Date.now();
  while (Date.now() - start < maxWaitMs) {
    try {
      const el = window.parent.document.getElementById('stl-b64-data');
      if (el && el.value && el.value.length > 100) return el.value;
    } catch (_) { /* cross-origin: ignore */ }
    await new Promise(r => setTimeout(r, 150));
  }
  return null;
}

const b64 = await waitForData();
if (!b64) {
  loadingEl.style.display = 'none';
  errorEl.textContent = 'Timed out waiting for sculpture data.';
  errorEl.style.display = 'block';
  throw new Error('No STL data available');
}

const raw = atob(b64);
const buf = new Uint8Array(raw.length);
for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
const arrayBuffer = buf.buffer;

/* ---------- scene setup ---------- */
const scene    = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

scene.background = new THREE.Color('#1a1a2e');
scene.fog = new THREE.FogExp2('#1a1a2e', 0.003);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.6;

/* lighting */
scene.add(new THREE.AmbientLight(0xb8b0ff, 0.6));

const key = new THREE.DirectionalLight(0xffffff, 1.2);
key.position.set(80, 120, 100);
scene.add(key);

const fill = new THREE.DirectionalLight(0xd4c5f9, 0.5);
fill.position.set(-60, 40, -80);
scene.add(fill);

const rim = new THREE.DirectionalLight(0x7c3aed, 0.4);
rim.position.set(0, -80, 60);
scene.add(rim);

/* ---------- load STL ---------- */
const loader = new STLLoader();
let geometry;
try {
  geometry = loader.parse(arrayBuffer);
} catch (e) {
  loadingEl.style.display = 'none';
  errorEl.textContent = 'Failed to parse STL: ' + e.message;
  errorEl.style.display = 'block';
  throw e;
}

geometry.computeVertexNormals();

const material = new THREE.MeshPhysicalMaterial({
  color: 0x9b8cff,
  metalness: 0.25,
  roughness: 0.35,
  clearcoat: 0.3,
  clearcoatRoughness: 0.2,
  side: THREE.DoubleSide,
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

/* center and fit camera — closer than before */
geometry.computeBoundingBox();
const box = geometry.boundingBox;
const center = new THREE.Vector3();
box.getCenter(center);
const size = new THREE.Vector3();
box.getSize(size);

mesh.position.sub(center);

const maxDim = Math.max(size.x, size.y, size.z);
const fitDist = maxDim / (2 * Math.tan(Math.PI * camera.fov / 360));
camera.position.set(fitDist * 0.35, fitDist * 0.28, fitDist * 0.40);
controls.target.set(0, 0, 0);
controls.update();

const initialCamPos = camera.position.clone();
const initialTarget = controls.target.clone();

/* grid helper */
const gridSize = Math.ceil(maxDim * 1.5 / 10) * 10;
const grid = new THREE.GridHelper(gridSize, gridSize / 5, 0x2a2a4e, 0x22223a);
grid.position.y = box.min.y - center.y - 0.5;
scene.add(grid);

/* info */
const faces = geometry.index ? geometry.index.count / 3 : geometry.attributes.position.count / 3;
infoEl.innerHTML =
  `${Math.round(faces).toLocaleString()} faces &middot; ` +
  `${size.x.toFixed(1)} &times; ${size.y.toFixed(1)} &times; ${size.z.toFixed(1)} mm` +
  `<br/>Drag to rotate &middot; Scroll to zoom &middot; Right-drag to pan`;

loadingEl.style.display = 'none';

/* ---------- controls ---------- */
let wireframe = false;
document.getElementById('btn-wire').addEventListener('click', () => {
  wireframe = !wireframe;
  material.wireframe = wireframe;
  document.getElementById('btn-wire').textContent = wireframe ? 'Solid' : 'Wireframe';
});

document.getElementById('btn-reset').addEventListener('click', () => {
  camera.position.copy(initialCamPos);
  controls.target.copy(initialTarget);
  controls.update();
});

/* ---------- render loop ---------- */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
